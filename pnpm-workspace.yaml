packages:
  - 'apps/*'
  - 'apps/admin-web/packages/*'
  - 'libs/*'
  - 'docs'

catalog:
  # ============================================================================
  # TypeScript & 核心语言
  # ============================================================================
  typescript: '5.8.3'

  # ============================================================================
  # 运行时共享库
  # ============================================================================

  # 日期时间
  dayjs: '1.11.19'

  # HTTP 客户端
  axios: '1.12.2'

  # Vue 生态
  vue: '3.5.24'
  vue-router: '4.6.3'
  pinia: '3.0.4'
  vue-i18n: '9.14.2'

  # 工具库
  lodash: '4.17.21'
  '@types/lodash': '4.17.13'

  # 加密与安全
  crypto-js: '4.2.0'
  '@types/crypto-js': '4.2.2'
  bcryptjs: '3.0.2'

  # UUID
  uuid: '9.0.1'

  # Excel 处理
  exceljs: '4.4.0'

  # 压缩与归档
  archiver: '7.0.1'
  '@types/archiver': '7.0.0'
  compressing: '2.0.0'

  # ============================================================================
  # NestJS 生态（后端专用）
  # ============================================================================
  '@nestjs/common': '10.4.15'
  '@nestjs/core': '10.4.15'
  '@nestjs/platform-express': '10.4.15'
  '@nestjs/config': '3.1.1'
  '@nestjs/jwt': '10.2.0'
  '@nestjs/passport': '10.0.3'
  '@nestjs/swagger': '11.2.3'
  '@nestjs/schedule': '4.1.2'
  '@nestjs/terminus': '11.0.0'
  '@nestjs/throttler': '6.5.0'
  '@nestjs/event-emitter': '3.0.1'
  '@nestjs/axios': '3.0.2'
  '@nestjs/bull': '11.0.4'
  '@nestjs/mapped-types': '2.0.5'

  # ============================================================================
  # 数据库与 ORM
  # ============================================================================
  '@prisma/client': '6.7.0'
  prisma: '6.7.0'

  # ============================================================================
  # 开发工具共享
  # ============================================================================
  '@types/node': '22.15.0'
  eslint: '9.39.1'
  prettier: '3.3.3'

  # ============================================================================
  # 测试工具
  # ============================================================================
  vitest: '2.1.9'
  '@vitest/coverage-v8': '2.1.9'
  jest: '29.5.0'
  '@types/jest': '29.5.2'

  # ============================================================================
  # Git Hooks & Commit 规范
  # ============================================================================
  simple-git-hooks: '2.13.1'
  lint-staged: '15.2.10'
  '@commitlint/cli': '19.8.1'
  '@commitlint/config-conventional': '19.8.1'

  # ============================================================================
  # CLI 工具
  # ============================================================================
  chalk: '4.1.2'
  ora: '5.4.1'

  # ============================================================================
  # 部署与运维
  # ============================================================================
  ssh2: '1.17.0'
  cross-env: '7.0.3'

  # ============================================================================
  # 构建工具共享
  # ============================================================================
  sass: '1.94.0'
