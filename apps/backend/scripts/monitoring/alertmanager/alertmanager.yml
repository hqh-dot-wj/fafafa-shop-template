route:
  group_by: ['alertname', 'service', 'severity']
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 2h
  receiver: default-null

receivers:
  - name: default-null

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal:
      - alertname
      - service
