services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: nest-admin-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - '9090:9090'
    volumes:
      - ./apps/backend/scripts/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./apps/backend/scripts/monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - ./apps/backend/scripts/monitoring/rate-limit-alert.rules.yml:/etc/prometheus/rules/rate-limit-alert.rules.yml:ro
      - ./db/prometheus:/prometheus
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: nest-admin-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - '9093:9093'
    volumes:
      - ./apps/backend/scripts/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./db/alertmanager:/alertmanager

  grafana:
    image: grafana/grafana:11.1.0
    container_name: nest-admin-grafana
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_DEFAULT_THEME: light
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/backend-observability-advanced.json
    volumes:
      - ./apps/backend/scripts/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./apps/backend/scripts/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./db/grafana:/var/lib/grafana
    depends_on:
      - prometheus
