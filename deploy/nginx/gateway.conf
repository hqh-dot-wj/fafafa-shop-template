# 单 IP / 无域名：子路径入口（与服务器 .env 无强绑定，仅依赖 Compose 服务名）
#   /           → landing（宣传页，deploy/sites/landing）
#   /shop/      → c-web（Nuxt 3 响应式 C 端，构建 base=/shop/）
#   /admin/     → admin（管理后台，构建 base=/admin/）
#   /api/       → api（NestJS，应用配置见服务器 .env）
#   /profile/   → api（本地上传静态，FILE_IS_LOCAL 时）
#
# 有域名后可改为多 server_name，或保留子路径；HTTPS 在 gateway 层加 443 即可。

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # SSE 长连接：禁用缓冲与短超时，避免 chunked 流被网关截断（ERR_INCOMPLETE_CHUNKED_ENCODING）
    location = /api/resource/sse {
        proxy_pass http://api:8080/api/resource/sse;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_set_header Cache-Control no-cache;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding on;
    }

    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /profile/ {
        proxy_pass http://api:8080/profile/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /shop/ {
        proxy_pass http://c-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://landing:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
