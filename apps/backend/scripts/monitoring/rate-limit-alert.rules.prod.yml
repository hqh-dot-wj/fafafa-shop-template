groups:
  - name: nest-admin-rate-limit-prod
    interval: 30s
    rules:
      - alert: ProductListRateLimitFallbackSpike
        expr: increase(rate_limit_events_total{scope="client-product-list",outcome="fallback"}[5m]) > 800
        for: 3m
        labels:
          severity: warning
          service: backend
          category: rate-limit
          environment: prod
        annotations:
          summary: '商品列表限流兜底激增(prod)'
          description: '5分钟内商品列表 stale-cache 兜底次数超过 800，建议检查热点流量和缓存命中率。'

      - alert: ProductListRateLimitRejectSpike
        expr: increase(rate_limit_events_total{scope="client-product-list",outcome="reject"}[5m]) > 100
        for: 2m
        labels:
          severity: critical
          service: backend
          category: rate-limit
          environment: prod
        annotations:
          summary: '商品列表限流拒绝激增(prod)'
          description: '5分钟内商品列表被限流拒绝次数超过 100，已影响用户查询可用性。'

      - alert: GlobalRateLimitRejectSpike
        expr: increase(rate_limit_events_total{source="express",scope="global-http",outcome="reject"}[5m]) > 300
        for: 2m
        labels:
          severity: critical
          service: backend
          category: rate-limit
          environment: prod
        annotations:
          summary: '全局限流拒绝激增(prod)'
          description: '5分钟内全局限流拒绝次数超过 300，建议检查异常流量和边缘限流配置。'

      - alert: ProductListFallbackDominates
        expr: |
          (
            increase(rate_limit_events_total{scope="client-product-list",outcome="fallback"}[10m])
            /
            clamp_min(
              increase(rate_limit_events_total{scope="client-product-list",outcome=~"fallback|reject"}[10m]),
              1
            )
          ) > 0.9
        for: 10m
        labels:
          severity: warning
          service: backend
          category: rate-limit
          environment: prod
        annotations:
          summary: '商品列表长期依赖兜底(prod)'
          description: '近10分钟限流事件中，兜底占比超过90%，主链路可能持续承压。'

      - alert: ProductListOverloadFallbackSpike
        expr: increase(rate_limit_events_total{source="overload_guard",scope="client-product-list",outcome="fallback"}[5m]) > 250
        for: 3m
        labels:
          severity: warning
          service: backend
          category: overload
          environment: prod
        annotations:
          summary: '商品列表过载兜底激增(prod)'
          description: '5分钟内因并发舱壁触发的商品列表兜底超过 250，建议核查容量与缓存命中率。'

      - alert: ProductListOverloadRejectSpike
        expr: increase(rate_limit_events_total{source="overload_guard",scope="client-product-list",outcome="reject"}[5m]) > 40
        for: 2m
        labels:
          severity: critical
          service: backend
          category: overload
          environment: prod
        annotations:
          summary: '商品列表过载拒绝激增(prod)'
          description: '5分钟内因并发舱壁触发的商品列表拒绝超过 40，已出现过载丢流。'

      - alert: RateLimitMetricsMissing
        expr: absent(rate_limit_events_total)
        for: 5m
        labels:
          severity: warning
          service: backend
          category: observability
          environment: prod
        annotations:
          summary: '限流指标缺失(prod)'
          description: '连续5分钟未采集到 rate_limit_events_total，可能是监控抓取或应用指标异常。'
