# 构建产物 base=/shop/；对外由 gateway 映射到 http://<host>/shop/
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location = /shop {
        return 301 /shop/;
    }

    location /shop/ {
        try_files $uri $uri/ /shop/index.html;
    }

    location ~* ^/shop/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
