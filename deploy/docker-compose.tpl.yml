# =============================================================================
# fafafa.app 模板部署 - Docker Compose 模板
# =============================================================================
#
# 与 deploy/docker-compose.prod.yml 的差异（fafafa 模式 vs 手工部署）：
#   1. 容器命名：${PROJECT_NAMES}-<service>-prod，按 fafafa 订单 slug 隔离，多实例同机互不冲突
#   2. 数据库：使用 fafafa 平台分配的外部 PostgreSQL（DB_HOST/DB_NAME/DB_USER/DB_PASSWORD），
#      不再内置 postgres 容器；密码由 scripts/template/exchange-credential.sh 通过
#      CREDENTIAL_REF 调 /api/web/provisioning/credentials/exchange 实时换取
#   3. Redis：仍内置（fafafa 当前未在 provisioning 变量中分配 Redis），每实例独立 redis 容器，
#      与 ${PROJECT_NAMES} 隔离；后续 fafafa 加入 Redis 分配后可切外部
#   4. 网络：加入外部 ${EXTERNAL_NETWORK_NAME:-shared_net}，task-nginx 通过
#      ${PROJECT_NAMES}-web-prod:80 反代该实例
#   5. 端口：不映射宿主机端口（多实例同机冲突），由 task-nginx 在 shared_net 内 upstream
#   6. 对外入口统一为 ${PROJECT_NAMES}-web-prod（即原 gateway），简化 task-nginx 配置
#
# 平台注入变量（详见 deploy/template.env.example）：
#   必需：PROJECT_NAMES, EXTERNAL_NETWORK_NAME, REGISTRY_NAMESPACE, IMAGE_TAG,
#         DOMAIN, DB_HOST, DB_NAME, DB_USER, DB_PASSWORD,
#         JWT_SECRET, REDIS_PASSWORD,
#         TEMPLATE_BRAND_COMPANY_NAME, TEMPLATE_ADMIN_USERNAME, TEMPLATE_ADMIN_PASSWORD
#   可选：DB_PORT(默认5432), CRYPTO_RSA_PUBLIC_KEY, CRYPTO_RSA_PRIVATE_KEY,
#         MARKETING_ACTIVITY_TOKEN_SECRET_PRIMARY,
#         TEMPLATE_BRAND_LOGO_URL, TEMPLATE_BRAND_CONTACT_PHONE
# =============================================================================

name: ${PROJECT_NAMES:?PROJECT_NAMES required from fafafa provisioning}

services:
  # ---------------------------------------------------------------------------
  # 数据层：仅 redis（postgres 由 fafafa 平台分配，DB_HOST 直连外部）
  # ---------------------------------------------------------------------------

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAMES}-redis-prod
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  # ---------------------------------------------------------------------------
  # API：连接外部 fafafa 分配的 PostgreSQL
  # ---------------------------------------------------------------------------

  api:
    image: ${REGISTRY_NAMESPACE}/backend:${IMAGE_TAG:-latest}
    container_name: ${PROJECT_NAMES}-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_PORT: 8080
      APP_PREFIX: /api
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-2}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # 多租户：单实例单租户兜底（fafafa 一部署 = 一客户；Phase 2 才精简代码）
      TENANT_ENABLED: 'true'
      TENANT_SUPER_ID: '000000'
      TENANT_DEFAULT_ID: '000000'
      # 加密
      CRYPTO_ENABLED: ${CRYPTO_ENABLED:-true}
      CRYPTO_RSA_PUBLIC_KEY: ${CRYPTO_RSA_PUBLIC_KEY:-}
      CRYPTO_RSA_PRIVATE_KEY: ${CRYPTO_RSA_PRIVATE_KEY:-}
      # 文件上传：本地落盘到 api_uploads 卷；FILE_DOMAIN 用 fafafa 注入的 DOMAIN
      FILE_IS_LOCAL: ${FILE_IS_LOCAL:-true}
      FILE_UPLOAD_LOCATION: upload
      FILE_DOMAIN: https://${DOMAIN:?DOMAIN required from fafafa}
      FILE_SERVE_ROOT: /profile
      MARKETING_ACTIVITY_TOKEN_SECRET_PRIMARY: ${MARKETING_ACTIVITY_TOKEN_SECRET_PRIMARY:-fallback-please-override-in-fafafa}
      # 品牌（被 seed apply-template-branding 读取，覆写 SysTenant 000000）
      TEMPLATE_BRAND_COMPANY_NAME: ${TEMPLATE_BRAND_COMPANY_NAME:?TEMPLATE_BRAND_COMPANY_NAME required}
      TEMPLATE_BRAND_LOGO_URL: ${TEMPLATE_BRAND_LOGO_URL:-}
      TEMPLATE_BRAND_CONTACT_PHONE: ${TEMPLATE_BRAND_CONTACT_PHONE:-}
      TEMPLATE_BRAND_DOMAIN: ${DOMAIN}
      TEMPLATE_ADMIN_USERNAME: ${TEMPLATE_ADMIN_USERNAME:?TEMPLATE_ADMIN_USERNAME required}
      TEMPLATE_ADMIN_PASSWORD: ${TEMPLATE_ADMIN_PASSWORD:?TEMPLATE_ADMIN_PASSWORD required}
    volumes:
      - api_uploads:/app/apps/backend/upload
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - '8080'
    networks:
      - app_net
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:8080/api/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ---------------------------------------------------------------------------
  # 静态前端（容器内 nginx，子路径 /shop/、/admin/、/landing）
  # ---------------------------------------------------------------------------

  admin:
    image: ${REGISTRY_NAMESPACE}/admin:${IMAGE_TAG:-latest}
    container_name: ${PROJECT_NAMES}-admin-prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '80'
    networks:
      - app_net
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://127.0.0.1/admin/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  c-web:
    image: ${REGISTRY_NAMESPACE}/c-web:${IMAGE_TAG:-latest}
    container_name: ${PROJECT_NAMES}-c-web-prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '80'
    networks:
      - app_net
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://127.0.0.1/shop/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  landing:
    image: ${REGISTRY_NAMESPACE}/landing:${IMAGE_TAG:-latest}
    container_name: ${PROJECT_NAMES}-landing-prod
    restart: unless-stopped
    expose:
      - '80'
    networks:
      - app_net
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://127.0.0.1/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # web（原 gateway）：对外统一入口；task-nginx 在 ${EXTERNAL_NETWORK_NAME} 网络内反代
  # 容器名 ${PROJECT_NAMES}-web-prod 对应 fafafa deploy-result presetKey=WEB
  # 不再映射宿主机端口（多实例同机部署），task-nginx 通过 docker DNS 直达
  # ---------------------------------------------------------------------------

  web:
    image: nginx:1.27-alpine
    container_name: ${PROJECT_NAMES}-web-prod
    restart: unless-stopped
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      landing:
        condition: service_healthy
      c-web:
        condition: service_healthy
      admin:
        condition: service_healthy
      api:
        condition: service_healthy
    expose:
      - '80'
    networks:
      - app_net
      - shared_net
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://127.0.0.1/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# -----------------------------------------------------------------------------
# 持久化卷：仅 redis 与上传文件本地存储；外部 DB 不在此管理
# -----------------------------------------------------------------------------
volumes:
  redis_data:
  api_uploads:

# -----------------------------------------------------------------------------
# 网络：
#   app_net   - 实例内部网络（api/redis/c-web/admin/landing/web），与同机其他实例隔离
#   shared_net - 外部已存在网络（task-nginx 用），仅 web 容器加入，作为对外反代入口
# -----------------------------------------------------------------------------
networks:
  app_net:
    name: ${PROJECT_NAMES}_app_net
  shared_net:
    name: ${EXTERNAL_NETWORK_NAME:-shared_net}
    external: true
