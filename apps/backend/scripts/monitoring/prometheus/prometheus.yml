global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/backend-observability.rules.yml
  - /etc/prometheus/rules/rate-limit-alert.rules.yml

scrape_configs:
  - job_name: nest-admin-backend
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          app: nest-admin-backend
          env: local

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
