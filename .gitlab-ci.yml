# =============================================================================
# fafafa.app 商城模板 - GitLab CI Pipeline
# =============================================================================
# 本 Pipeline 由 fafafa.app 交付引擎在用户开通订单时通过 Trigger API 调起。
# 平台注入的变量见 deploy/template.env.example。
#
# Pipeline 流程（与 docs/provisioning-engine.md 约定一致）：
#   1. validate    校验注入变量、CI runner 工具
#   2. build       构建并推送本次镜像到 ${CI_REGISTRY_IMAGE}
#   3. init        SSH 到目标主机准备部署目录与 shared_net 网络
#   4. migrate     一次性容器跑 prisma migrate deploy + seed + 品牌覆写
#   5. deploy      生成远端 .env + docker compose up -d 启动全栈
#   6. healthcheck 等待所有容器健康
#   7. callback    deploy-result（C1）+ 流水线 complete callback
#
# 注意：本仓库 main 分支 push 不直接走该 pipeline；只有 fafafa Trigger 调起时
#       才会走（rules.if 守卫）。日常开发的 verify 由 .github/workflows 或本地
#       pnpm verify 负责，不与本流水线混用。
# =============================================================================

stages:
  - validate
  - build
  - deploy
  - notify

variables:
  IMAGE_TAG: '${CI_COMMIT_SHORT_SHA}'
  REGISTRY_NAMESPACE: '${CI_REGISTRY_IMAGE}'
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: '/certs'
  DOCKER_HOST: 'tcp://docker:2376'
  DOCKER_CERT_PATH: '/certs/client'
  DOCKER_TLS_VERIFY: '1'

default:
  timeout: 30 minutes
  tags:
    - x # 与 fafafa.app 自身平台 runner tag 一致；如不同请在仓库变量覆盖

# 全 Pipeline 守卫：仅 fafafa Trigger 调起（pipeline source = trigger / api / web）才执行；
# 防止开发者 push 触发空 pipeline 浪费 runner 配额
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "api" || $CI_PIPELINE_SOURCE == "web"'

# =============================================================================
# Stage 1: validate
# =============================================================================
validate:
  stage: validate
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash curl openssh-client docker-cli
  script:
    - bash deploy/scripts/template/validate.sh

# =============================================================================
# Stage 2: build（构建并推送镜像：backend / admin / c-web / landing）
# =============================================================================
.build-base: &build-base
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  before_script:
    - |
      echo "等待 Docker 守护进程就绪..."
      for i in $(seq 1 60); do
        if docker info >/dev/null 2>&1; then echo "Docker 已就绪"; break; fi
        sleep 2
      done
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

build:backend:
  <<: *build-base
  script:
    - docker build -f deploy/docker/backend.Dockerfile -t "${REGISTRY_NAMESPACE}/backend:${IMAGE_TAG}" .
    - docker push "${REGISTRY_NAMESPACE}/backend:${IMAGE_TAG}"

build:admin:
  <<: *build-base
  script:
    - docker build -f deploy/docker/admin.Dockerfile -t "${REGISTRY_NAMESPACE}/admin:${IMAGE_TAG}" .
    - docker push "${REGISTRY_NAMESPACE}/admin:${IMAGE_TAG}"

build:c-web:
  <<: *build-base
  script:
    - docker build -f deploy/docker/c-web.Dockerfile -t "${REGISTRY_NAMESPACE}/c-web:${IMAGE_TAG}" .
    - docker push "${REGISTRY_NAMESPACE}/c-web:${IMAGE_TAG}"

build:landing:
  <<: *build-base
  script:
    - docker build -f deploy/docker/landing.Dockerfile -t "${REGISTRY_NAMESPACE}/landing:${IMAGE_TAG}" .
    - docker push "${REGISTRY_NAMESPACE}/landing:${IMAGE_TAG}"

# =============================================================================
# Stage 3: deploy（init → migrate → deploy → healthcheck，串行依赖）
# 每步失败都已在 script 内部 callback failed 并退出，notify stage 不会再补 failed
# =============================================================================
.deploy-base: &deploy-base
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash curl openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - |
      if [ -n "${SSH_PRIVATE_KEY:-}" ]; then
        printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
      else
        echo "❌ 缺少 SSH_PRIVATE_KEY（请在 fafafa ProductDeployTemplate 或 GitLab CI Variables 配置）"
        exit 1
      fi

init:
  <<: *deploy-base
  needs:
    - job: validate
    - job: build:backend
    - job: build:admin
    - job: build:c-web
    - job: build:landing
  script:
    - bash deploy/scripts/template/init.sh

migrate:
  <<: *deploy-base
  needs: ['init']
  script:
    - bash deploy/scripts/template/migrate.sh

deploy:
  <<: *deploy-base
  needs: ['migrate']
  script:
    - bash deploy/scripts/template/deploy.sh

healthcheck:
  <<: *deploy-base
  needs: ['deploy']
  script:
    - bash deploy/scripts/template/healthcheck.sh

# =============================================================================
# Stage 4: notify（向 fafafa 平台回写 deploy-result + complete）
# =============================================================================
callback:
  stage: notify
  image: alpine:3.20
  needs: ['healthcheck']
  before_script:
    - apk add --no-cache bash curl
  script:
    - bash deploy/scripts/template/callback.sh
