# 构建产物 base=/h5/；对外由 gateway 映射到 http://<host>/h5/
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location = /h5 {
        return 301 /h5/;
    }

    location /h5/ {
        try_files $uri $uri/ /h5/index.html;
    }

    location ~* ^/h5/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
