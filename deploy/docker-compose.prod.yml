# =============================================================================
# 生产 Docker Compose（数据层 + API + 三个静态前端 + 统一网关）
# =============================================================================
#
# 【对外入口】仅 gateway 映射宿主机端口（默认 80），浏览器只访问 gateway。
# 【子路径路由】见 deploy/nginx/gateway.conf（与服务器 .env 无强绑定）：
#   /           → landing   宣传页（纯静态，源码 deploy/sites/landing/）
#   /shop/      → c-web     Nuxt 3 响应式 C 端（构建 base=/shop/）
#   /admin/     → admin     管理后台（构建 base=/admin/）
#   /api/       → api       NestJS 业务接口（全局前缀，见 APP_PREFIX）
#   /profile/   → api       本地上传文件静态访问（FILE_IS_LOCAL=true 时）
#
# 【服务器目录】由 CI scp 同步（deploy/scripts/remote_deploy.sh 滚动更新）：
#   docker-compose.prod.yml
#   .env                      api 运行时：DB、Redis、JWT、OSS、FILE_IS_LOCAL 等
#   nginx/gateway.conf        网关路由（改路径只改 nginx + 前端构建 base，不必改 .env）
#   scripts/remote_deploy.sh
#   scripts/cleanup-images.sh
#
# 【Compose 用到的 .env 变量】（完整模板见 deploy/env.production.example）：
#   必填：POSTGRES_PASSWORD、REDIS_PASSWORD、REGISTRY_NAMESPACE
#   常用：POSTGRES_USER、POSTGRES_DB、IMAGE_TAG、HTTP_PORT、COMPOSE_NETWORK_NAME
#   镜像：REGISTRY_NAMESPACE/backend|admin|c-web|landing:${IMAGE_TAG:-latest}
#
# 【本地/研究机】无 GHCR 时可自行 docker build 后改 image 为本地标签，不必有 ci.env。
# =============================================================================

name: nest-admin-prod

services:
  # ---------------------------------------------------------------------------
  # 数据层
  # ---------------------------------------------------------------------------

  postgres:
    # PostGIS：与 Prisma schema 地理字段一致；数据持久化在命名卷 postgres_data
    image: postgis/postgis:15-3.3-alpine
    container_name: nest-admin-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-nest-admin-soybean}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nest-admin-soybean}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nest_admin_net

  redis:
    # 会话、缓存、队列等；密码通过 command 注入，healthcheck 中 $$ 转义为容器内 $
    image: redis:7-alpine
    container_name: nest-admin-redis-prod
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    command: redis-server --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nest_admin_net

  # ---------------------------------------------------------------------------
  # 应用层：API（唯一有状态业务逻辑的服务）
  # ---------------------------------------------------------------------------

  api:
    # 镜像由 deploy/docker/backend.Dockerfile 构建；不对外暴露端口，仅 gateway 反代
    image: ${REGISTRY_NAMESPACE}/backend:${IMAGE_TAG:-latest}
    container_name: nest-admin-api-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 以下覆盖/补充 .env，保证容器内连到 compose 服务名而非 localhost
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nest-admin-soybean}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-2}
    volumes:
      # FILE_IS_LOCAL=true 时上传落盘目录；OSS 模式可仍保留卷但通常不写文件
      - api_uploads:/app/apps/backend/upload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '8080'
    networks:
      - nest_admin_net
    healthcheck:
      # 与 APP_PREFIX 默认 /api 一致；迁移/种子在 remote_deploy 里 compose run api 执行
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:8080/api/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ---------------------------------------------------------------------------
  # 静态前端（容器内 nginx，仅 expose 80，不映射宿主机端口）
  # 构建参数（子路径 base）在各自 Dockerfile 中，见 deploy/docker/*.Dockerfile
  # ---------------------------------------------------------------------------

  admin:
    # admin-web 生产构建；访问路径 /admin/；接口走 gateway 同源 /api
    image: ${REGISTRY_NAMESPACE}/admin:${IMAGE_TAG:-latest}
    container_name: nest-admin-admin-prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '80'
    networks:
      - nest_admin_net
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://127.0.0.1/admin/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  c-web:
    image: ${REGISTRY_NAMESPACE}/c-web:${IMAGE_TAG:-latest}
    container_name: nest-admin-c-web-prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '80'
    networks:
      - nest_admin_net
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://127.0.0.1/shop/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  landing:
    # 宣传页纯静态，内容来自 deploy/sites/landing/；无后端依赖，可先启动
    image: ${REGISTRY_NAMESPACE}/landing:${IMAGE_TAG:-latest}
    container_name: nest-admin-landing-prod
    restart: unless-stopped
    expose:
      - '80'
    networks:
      - nest_admin_net
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://127.0.0.1/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # 网关：唯一对外端口，按路径分发到上述服务
  # ---------------------------------------------------------------------------

  gateway:
    image: nginx:1.27-alpine
    container_name: nest-admin-gateway-prod
    restart: unless-stopped
    ports:
      # 宿主机对外端口，与 deploy/ci.env 中 HTTP_PORT 一致
      - '${HTTP_PORT:-80}:80'
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      # 等静态站与 API 健康后再接流量，避免启动瞬间 502
      landing:
        condition: service_healthy
      c-web:
        condition: service_healthy
      admin:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - nest_admin_net

# -----------------------------------------------------------------------------
# 持久化卷（docker volume ls；备份/迁移时需单独处理）
# -----------------------------------------------------------------------------
volumes:
  postgres_data: # 数据库文件
  redis_data: # Redis RDB/AOF
  api_uploads: # 本地上传目录（api 容器内 /app/apps/backend/upload）

# -----------------------------------------------------------------------------
# 内部网络：各服务通过服务名互访（api、postgres、redis、admin、c-web、landing）
# -----------------------------------------------------------------------------
networks:
  nest_admin_net:
    name: ${COMPOSE_NETWORK_NAME:-nest_admin_net}
